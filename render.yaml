services:
  - type: web
    name: asp-nextjs
    env: node
    buildCommand: npm install && npx prisma generate && npx hardhat compile && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: asp-postgres
          property: connectionString
      - key: DATABASE_POSTGRES_URL_NON_POOLING
        fromDatabase:
          name: asp-postgres
          property: connectionString
      - key: AUTH_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: TWITTER_CLIENT_ID
        sync: false
      - key: TWITTER_CLIENT_SECRET
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false

databases:
  - name: asp-postgres
    databaseName: asp_db
    user: asp_user
